<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEFLIX - Método Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #e50914; --bg-black: #000000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            background-color: var(--bg-black); 
            font-family: 'Roboto', sans-serif; 
            color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow-x: hidden; 
        }

        .container { 
            max-width: 850px; 
            width: 90%; 
            text-align: center; 
            padding: 30px 0; 
        }
        
        .headline { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 2.8rem; 
            line-height: 1.1; 
            margin-bottom: 25px; 
            color: #ffffff; 
            text-transform: uppercase;
        }
        .headline span { color: var(--primary-red); }

        /* Player Wrapper */
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            padding-bottom: 56.25%; 
            background: #111; 
            border-radius: 8px; 
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.2); 
            overflow: hidden; 
            border: 1px solid #222; 
        }
        .video-wrapper iframe { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: none; z-index: 1; 
        }

        /* CAMADA DE AVISO DE SOM */
        .video-overlay { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10; cursor: pointer; 
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .audio-icon {
            width: 80px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        .overlay-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            background: var(--primary-red);
            padding: 10px 20px;
            border-radius: 5px;
            animation: pulse 1.5s infinite;
        }

        /* Botão Gameflix com Delay */
        #cta-container { 
            margin-top: 35px; 
            display: none; 
            width: 100%;
            animation: surge 0.8s ease-out; 
        }
        .netflix-btn { 
            display: inline-block; 
            padding: 20px 0; 
            width: 100%; 
            max-width: 500px;
            font-size: 22px; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: #fff; 
            background: linear-gradient(90deg, #e50914, #ff3b3b); 
            border: none; 
            border-radius: 5px; 
            text-decoration: none; 
            box-shadow: 0 0 20px #e50914, 0 0 40px #ff3b3b; 
            animation: float 2.5s ease-in-out infinite; 
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes surge { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 600px) {
            .headline { font-size: 1.8rem; }
            .overlay-text { font-size: 18px; }
            .audio-icon { width: 50px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="headline">ESTE MÉTODO LIBERA MAIS DE 40 JOGOS <span>PREMIUM</span> NO SEU PC HOJE</h1>
        
        <div class="video-wrapper">
            <div class="video-overlay" id="overlay" onclick="startVideo()">
                <img src="https://cdn-icons-png.flaticon.com/512/461/461238.png" class="audio-icon" style="filter: invert(1);">
                <div class="overlay-text">TOQUE PARA OUVIR</div>
            </div>
            
            <div id="player"></div>
        </div>

        <div id="cta-container">
            <a href="http://www.gameflixoficial.com.br/" class="netflix-btn">VEJA NOSSOS PLANOS</a>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const VIDEO_ID = 'ASzOzrB-a9E'; 
        const DELAY = 10000; // 10 segundos
        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: VIDEO_ID,
                playerVars: { 
                    'autoplay': 1, 'controls': 0, 'disablekb': 1, 
                    'rel': 0, 'modestbranding': 1, 'mute': 1,
                    'origin': window.location.origin 
                }
            });
        }

        function startVideo() {
            // Remove o overlay
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
            }, 500);

            // Reinicia o vídeo com som
            player.unMute();
            player.seekTo(0);
            player.playVideo();

            // Inicia o contador do botão
            setTimeout(() => { 
                document.getElementById('cta-container').style.display = 'block'; 
            }, DELAY);
        }
    </script>
</body>
</html>
