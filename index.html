<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── TOKENS ─────────────────────────────────────────── */
        :root {
            --red:        #e50914;
            --red-glow:   rgba(229, 9, 20, 0.55);
            --red-dim:    rgba(229, 9, 20, 0.15);
            --black:      #000000;
            --surface:    #0d0d0d;
            --border:     rgba(255,255,255,0.07);
            --text:       #ffffff;
            --muted:      rgba(255,255,255,0.45);
            --progress-h: 4px;
            --green:      #25D366;
            --green-glow: rgba(37,211,102,0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--black);
            font-family: 'Barlow', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ─── GRAIN OVERLAY ──────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─── LAYOUT ─────────────────────────────────────────── */
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 48px 16px 140px;
        }

        /* ─── HEADLINE ───────────────────────────────────────── */
        .headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 5.5vw, 3.4rem);
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            text-align: center;
            max-width: 800px;
            margin-bottom: 36px;
        }
        .headline em {
            font-style: normal;
            color: var(--red);
            text-shadow: 0 0 32px var(--red-glow);
        }

        /* ─── AUDIO SECTION ──────────────────────────────────── */
        .audio-section {
            width: 100%;
            max-width: 820px;
            margin-bottom: 0;
        }

        .audio-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            box-shadow: 0 0 40px var(--red-dim), 0 8px 40px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* WhatsApp-style audio player */
        .wa-player {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: #1e2a1e;
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid rgba(37,211,102,0.2);
        }

        .wa-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wa-avatar svg { width: 22px; height: 22px; fill: #fff; }

        .wa-play-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--green);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 12px var(--green-glow);
        }
        .wa-play-btn:hover { transform: scale(1.08); box-shadow: 0 0 22px var(--green-glow); }
        .wa-play-btn svg { width: 16px; height: 16px; fill: #fff; margin-left: 2px; }
        .wa-play-btn.playing svg.icon-play { display: none; }
        .wa-play-btn:not(.playing) svg.icon-pause { display: none; }

        .wa-waveform-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .wa-waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 28px;
            cursor: pointer;
        }

        .wa-bar {
            width: 3px;
            border-radius: 2px;
            background: rgba(37,211,102,0.35);
            transition: background 0.1s;
            flex-shrink: 0;
        }
        .wa-bar.played { background: var(--green); }

        .wa-time {
            font-family: 'Barlow', sans-serif;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.45);
        }

        /* ─── ACCORDION (video section) ──────────────────────── */
        .accordion {
            width: 100%;
            max-width: 820px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
            opacity: 0;
        }
        .accordion.open {
            max-height: 1200px;
            opacity: 1;
        }

        .accordion-inner {
            padding-top: 20px;
        }

        /* ─── VIDEO CARD ─────────────────────────────────────── */
        .video-card {
            width: 100%;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 8px 60px rgba(0,0,0,0.8),
                0 0 80px var(--red-dim);
            overflow: hidden;
            position: relative;
        }

        .video-ratio {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }
        .video-ratio iframe,
        .video-ratio > div[id^="player"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Blocks native YouTube clicks */
        .video-blocker {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── CINEMA PLAY BUTTON OVERLAY ─────────────────────── */
        .cinema-play-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.55);
            transition: opacity 0.4s ease;
        }
        .cinema-play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .cinema-play-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff3b3b, #c40812 70%);
            border: 3px solid rgba(255,255,255,0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 0 0 0 rgba(229,9,20,0.7),
                0 0 40px rgba(229,9,20,0.8),
                0 0 80px rgba(229,9,20,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            animation: cinema-pulse 2s ease-in-out infinite;
            transition: transform 0.2s ease;
        }
        .cinema-play-btn:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 0 0 rgba(229,9,20,0.9),
                0 0 60px rgba(229,9,20,1),
                0 0 120px rgba(229,9,20,0.6),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .cinema-play-btn svg {
            width: 36px;
            height: 36px;
            fill: #fff;
            margin-left: 5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Outer ring pulse */
        .cinema-play-btn::before,
        .cinema-play-btn::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(229,9,20,0.5);
            animation: ring-expand 2s ease-out infinite;
        }
        .cinema-play-btn::after {
            animation-delay: 1s;
        }

        @keyframes cinema-pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(229,9,20,0.7), 0 0 40px rgba(229,9,20,0.8), 0 0 80px rgba(229,9,20,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(229,9,20,0), 0 0 60px rgba(229,9,20,1), 0 0 120px rgba(229,9,20,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
            }
        }

        @keyframes ring-expand {
            0% { width: 90px; height: 90px; opacity: 0.8; }
            100% { width: 160px; height: 160px; opacity: 0; }
        }

        /* ─── SOUND ACTIVATION OVERLAY ───────────────────────── */
        .sound-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(0,0,0,0.78);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .sound-overlay.hidden { display: none; }

        .sound-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #c40812 0%, #e50914 50%, #ff2a2a 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 0 2px rgba(229,9,20,0.3), 0 0 40px rgba(229,9,20,0.5);
            animation: pulse-btn 1.8s ease-in-out infinite;
        }
        .sound-btn svg { width: 22px; height: 22px; fill: #fff; }

        /* ─── PROGRESS BAR ───────────────────────────────────── */
        .progress-track {
            width: 100%;
            height: var(--progress-h);
            background: rgba(255,255,255,0.1);
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c40812, var(--red) 60%, #ff4444);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 10px var(--red);
            transition: width 0.5s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px var(--red);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 14px;
        }
        .progress-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            color: var(--red);
        }

        /* ─── WHATSAPP CTA BUTTON ────────────────────────────── */
        #cta-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 16px 28px;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 60%, transparent);
            display: flex;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #cta-wrap.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 48px;
            max-width: 560px;
            width: 100%;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #128C7E 0%, #25D366 60%, #2ecc71 100%);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            box-shadow:
                0 0 0 2px rgba(37,211,102,0.3),
                0 0 40px rgba(37,211,102,0.5),
                0 4px 24px rgba(0,0,0,0.6);
            animation: float-cta 2.4s ease-in-out infinite;
        }
        .cta-btn svg { width: 24px; height: 24px; fill: #fff; flex-shrink: 0; }
        .cta-btn:hover {
            box-shadow: 0 0 0 2px rgba(37,211,102,0.6), 0 0 60px rgba(37,211,102,0.7), 0 4px 24px rgba(0,0,0,0.6);
        }

        /* ─── ANIMATIONS ─────────────────────────────────────── */
        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 2px rgba(229,9,20,0.3), 0 0 30px rgba(229,9,20,0.4); }
            50%       { transform: scale(1.03); box-shadow: 0 0 0 2px rgba(229,9,20,0.5), 0 0 50px rgba(229,9,20,0.7); }
        }
        @keyframes float-cta {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── MOBILE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .page { padding: 28px 8px 120px; }
            .video-card { border-radius: 6px; }
            .cta-btn { font-size: 1.05rem; padding: 16px 20px; gap: 10px; }
            .sound-btn { font-size: 1rem; padding: 14px 24px; }
            .audio-card { padding: 14px 16px; }
            .cinema-play-btn { width: 72px; height: 72px; }
            .cinema-play-btn svg { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

                <!-- Player 2 -->

                <!-- Cinema Play Overlay (Video 2) -->
                <div class="cinema-play-overlay" id="cinemaOverlay2">
                    <button class="cinema-play-btn" id="cinemaPlayBtn2" onclick="startVideo2()">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

</div><!-- /.page -->

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /* ═══════════════════════════════════════════════════════════
       CONFIGURAÇÃO
       ═══════════════════════════════════════════════════════════ */
    const VIDEO1_ID       = 'KafPt_O_LD0';
    const VIDEO2_ID       = 'VXeYA-8Enps';
    const VIDEO2_DURATION = 0;   // detectado automaticamente do player
    /* ═══════════════════════════════════════════════════════════ */

    // ─── STATE ───────────────────────────────────────────────────
    let player1, player2;
    let video1Started        = false;
    let video2Started        = false;
    let progressInterval1    = null;
    let progressInterval2    = null;
    let ctaScheduled         = false;
    let elapsed1             = 0;
    let elapsed2             = 0;
    let video2CtaTimer       = null;

    // ─── AUDIO PLAYER (WhatsApp style) ───────────────────────────
    const audio      = document.getElementById('waAudio');
    const playBtn    = document.getElementById('waPlayBtn');
    const timeLabel  = document.getElementById('waTime');
    const waveform   = document.getElementById('waWaveform');

    // Generate fake waveform bars
    (function buildWaveform() {
        const heights = [3,5,8,12,18,22,26,30,28,24,18,14,20,27,33,28,22,17,25,32,36,30,24,19,26,34,28,22,16,18,25,30,26,20,15,22,28,24,18,14,20,26,22,16,12,18,24,20];
        heights.forEach(h => {
            const bar = document.createElement('div');
            bar.className = 'wa-bar';
            bar.style.height = (h / 36 * 26 + 4) + 'px';
            waveform.appendChild(bar);
        });
    })();

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + String(s).padStart(2,'0');
    }

    function updateWaveformProgress() {
        const bars = waveform.querySelectorAll('.wa-bar');
        const pct  = audio.duration ? audio.currentTime / audio.duration : 0;
        const playedCount = Math.floor(pct * bars.length);
        bars.forEach((b, i) => {
            b.classList.toggle('played', i < playedCount);
        });
        timeLabel.textContent = formatTime(audio.currentTime);
    }

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            playBtn.classList.add('playing');
        } else {
            audio.pause();
            playBtn.classList.remove('playing');
        }
    }

    function seekAudio(e) {
        if (!audio.duration) return;
        const rect = waveform.getBoundingClientRect();
        const pct  = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    }

    audio.addEventListener('timeupdate', updateWaveformProgress);

    audio.addEventListener('ended', () => {
        playBtn.classList.remove('playing');
        openAccordion1();
    });

    // ─── ACCORDION 1 — abre após o áudio terminar ─────────────────
    function openAccordion1() {
        const accordion = document.getElementById('accordion1');
        accordion.classList.add('open');
        setTimeout(() => {
            accordion.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 350);
        // Player já foi criado no onYouTubeIframeAPIReady, pausado.
        // Apenas exibe o overlay — a barra NÃO inicia aqui.
    }

    // ─── ACCORDION 2 — abre após o primeiro vídeo terminar ────────
    function openAccordion2() {
        const accordion = document.getElementById('accordion2');
        accordion.classList.add('open');
        setTimeout(() => {
            accordion.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 350);
    }

    // ─── YOUTUBE PLAYERS ──────────────────────────────────────────
    function onYouTubeIframeAPIReady() {
        // Player 1 — carrega pausado
        player1 = new YT.Player('player1', {
            height: '100%',
            width:  '100%',
            videoId: VIDEO1_ID,
            playerVars: {
                autoplay:       0,
                mute:           0,
                controls:       0,
                disablekb:      1,
                rel:            0,
                modestbranding: 1,
                iv_load_policy: 3,
                fs:             0,
                playsinline:    1,
                showinfo:       0,
            },
            events: {
                onReady:       onPlayer1Ready,
                onStateChange: onPlayer1StateChange,
            }
        });

        // Player 2 — carrega pausado
        player2 = new YT.Player('player2', {
            height: '100%',
            width:  '100%',
            videoId: VIDEO2_ID,
            playerVars: {
                autoplay:       0,
                mute:           0,
                controls:       0,
                disablekb:      1,
                rel:            0,
                modestbranding: 1,
                iv_load_policy: 3,
                fs:             0,
                playsinline:    1,
                showinfo:       0,
                start:          2,
            },
            events: {
                onReady:       onPlayer2Ready,
                onStateChange: onPlayer2StateChange,
            }
        });
    }

    function onPlayer1Ready(e) {
        // Player 1 pronto — fica pausado aguardando clique do usuário
        try { e.target.pauseVideo(); } catch(_) {}
    }

    function onPlayer2Ready(e) {
        // Player 2 pronto — fica pausado
        try { e.target.pauseVideo(); } catch(_) {}
    }

    function onPlayer1StateChange(e) {
        // Vídeo 1 terminou
        if (e.data === YT.PlayerState.ENDED) {
            clearInterval(progressInterval1);
            setProgressUI('progressFill1', 'progressPct1', 'progressLabel1', 100, 'Desbloqueado!');
            openAccordion2();
        }
        // Impede pausa externa enquanto rodando
        if (e.data === YT.PlayerState.PAUSED && video1Started) {
            setTimeout(() => { try { player1.playVideo(); } catch(_){} }, 200);
        }
    }

    function onPlayer2StateChange(e) {
        // Vídeo 2 terminou
        if (e.data === YT.PlayerState.ENDED) {
            clearInterval(progressInterval2);
            setProgressUI('progressFill2', 'progressPct2', 'progressLabel2', 100, 'Acesso liberado!');
            showCTA();
        }
        // Impede pausa externa enquanto rodando
        if (e.data === YT.PlayerState.PAUSED && video2Started) {
            setTimeout(() => { try { player2.playVideo(); } catch(_){} }, 200);
        }
    }

    // ─── INICIAR VÍDEO 1 (clique no botão cinema) ─────────────────
    function startVideo1() {
        // Esconde overlay
        const overlay = document.getElementById('cinemaOverlay1');
        overlay.classList.add('hidden');

        // Inicia o vídeo
        try {
            player1.playVideo();
        } catch(err) { console.warn('Player1 not ready', err); }

        video1Started = true;

        // Inicia a barra de progresso SOMENTE após o clique
        setProgressUI('progressFill1', 'progressPct1', 'progressLabel1', 0, 'Carregando acesso…');
        startFakeProgress1();
    }

    // ─── INICIAR VÍDEO 2 (clique no botão cinema) ─────────────────
    function startVideo2() {
        // Esconde overlay
        const overlay = document.getElementById('cinemaOverlay2');
        overlay.classList.add('hidden');

        // Inicia o vídeo
        try {
            player2.playVideo();
        } catch(err) { console.warn('Player2 not ready', err); }

        video2Started = true;

        // Inicia a barra de progresso SOMENTE após o clique
        setProgressUI('progressFill2', 'progressPct2', 'progressLabel2', 0, 'Carregando acesso…');
        startFakeProgress2();
        scheduleCtaVideo2();
    }

    // ─── FAKE PROGRESS — VÍDEO 1 ─────────────────────────────────
    function fakeProgressValue(elapsed) {
        if (elapsed < 60) {
            return 65 * (1 - Math.exp(-0.06 * elapsed));
        } else {
            const phase1 = 65 * (1 - Math.exp(-0.06 * 60));
            const extra  = (95 - phase1) * (1 - Math.exp(-0.006 * (elapsed - 60)));
            return phase1 + extra;
        }
    }

    function startFakeProgress1() {
        elapsed1 = 0;
        clearInterval(progressInterval1);
        progressInterval1 = setInterval(() => {
            elapsed1 += 0.5;
            const pct = Math.min(fakeProgressValue(elapsed1), 95);
            setProgressUI('progressFill1', 'progressPct1', 'progressLabel1', pct, 'Carregando acesso…');
        }, 500);
    }

    // ─── FAKE PROGRESS — VÍDEO 2 ─────────────────────────────────
    // Curva: cresce rápido no início, desacelera, chega perto de 100% só no final
    function fakeProgress2Value(elapsed) {
        // Fase 1: rápida até ~70% nos primeiros 40s
        if (elapsed < 40) {
            return 70 * (1 - Math.exp(-0.08 * elapsed));
        }
        // Fase 2: lenta de ~70% até 95% no restante
        const phase1 = 70 * (1 - Math.exp(-0.08 * 40));
        const extra  = (97 - phase1) * (1 - Math.exp(-0.004 * (elapsed - 40)));
        return phase1 + extra;
    }

    function startFakeProgress2() {
        elapsed2 = 0;
        clearInterval(progressInterval2);
        progressInterval2 = setInterval(() => {
            elapsed2 += 0.5;
            const pct = Math.min(fakeProgress2Value(elapsed2), 97);
            setProgressUI('progressFill2', 'progressPct2', 'progressLabel2', pct, 'Carregando acesso…');
        }, 500);
    }

    // ─── CTA VÍDEO 2 — últimos 10 segundos ────────────────────────
    function scheduleCtaVideo2() {
        // Tenta via polling a posição real do player2
        const ctaPollInterval = setInterval(() => {
            if (!video2Started) return;
            try {
                const duration = player2.getDuration();
                const current  = player2.getCurrentTime();
                if (duration > 0 && (duration - current) <= 10) {
                    clearInterval(ctaPollInterval);
                    showCTA();
                }
            } catch(_) {}
        }, 1000);
    }

    function showCTA() {
        if (ctaScheduled) return;
        ctaScheduled = true;
        document.getElementById('cta-wrap').classList.add('visible');
    }

    // ─── UTILIDADE: atualiza UI de barra ──────────────────────────
    function setProgressUI(fillId, pctId, labelId, pct, labelText) {
        const fill  = document.getElementById(fillId);
        const label = document.getElementById(labelId);
        const pctEl = document.getElementById(pctId);
        if (fill)  fill.style.width  = pct.toFixed(1) + '%';
        if (pctEl) pctEl.textContent = Math.round(pct) + '%';
        if (label && labelText) label.textContent = labelText;
    }

    // ─── BLOCK CONTEXT MENU ON VIDEO ─────────────────────────────
    document.addEventListener('contextmenu', e => {
        if (e.target.closest('.video-card')) e.preventDefault();
    });

    document.addEventListener('keydown', e => {
        const blocked = [' ', 'k', 'K', 'ArrowLeft', 'ArrowRight', 'j', 'J', 'l', 'L', 'f', 'F', 'm', 'M'];
        if (blocked.includes(e.key)) e.preventDefault();
    });
</script>
</body>
</html>
