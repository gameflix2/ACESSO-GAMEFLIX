<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── TOKENS ─────────────────────────────────────────── */
        :root {
            --red:        #e50914;
            --red-glow:   rgba(229, 9, 20, 0.55);
            --red-dim:    rgba(229, 9, 20, 0.15);
            --black:      #000000;
            --surface:    #0d0d0d;
            --border:     rgba(255,255,255,0.07);
            --text:       #ffffff;
            --muted:      rgba(255,255,255,0.45);
            --progress-h: 4px;
            --green:      #25D366;
            --green-glow: rgba(37,211,102,0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--black);
            font-family: 'Barlow', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ─── GRAIN OVERLAY ──────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─── LAYOUT ─────────────────────────────────────────── */
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 48px 16px 140px;
        }

        /* ─── HEADLINE ───────────────────────────────────────── */
        .headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 5.5vw, 3.4rem);
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            text-align: center;
            max-width: 800px;
            margin-bottom: 36px;
        }
        .headline em {
            font-style: normal;
            color: var(--red);
            text-shadow: 0 0 32px var(--red-glow);
        }

        /* ─── AUDIO SECTION ──────────────────────────────────── */
        .audio-section {
            width: 100%;
            max-width: 820px;
            margin-bottom: 0;
        }

        .audio-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            box-shadow: 0 0 40px var(--red-dim), 0 8px 40px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* WhatsApp-style audio player */
        .wa-player {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: #1e2a1e;
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid rgba(37,211,102,0.2);
        }

        .wa-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wa-avatar svg { width: 22px; height: 22px; fill: #fff; }

        .wa-play-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--green);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 12px var(--green-glow);
        }
        .wa-play-btn:hover { transform: scale(1.08); box-shadow: 0 0 22px var(--green-glow); }
        .wa-play-btn svg { width: 16px; height: 16px; fill: #fff; margin-left: 2px; }
        .wa-play-btn.playing svg.icon-play { display: none; }
        .wa-play-btn:not(.playing) svg.icon-pause { display: none; }

        .wa-waveform-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .wa-waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 28px;
            cursor: pointer;
        }

        .wa-bar {
            width: 3px;
            border-radius: 2px;
            background: rgba(37,211,102,0.35);
            transition: background 0.1s;
            flex-shrink: 0;
        }
        .wa-bar.played { background: var(--green); }

        .wa-time {
            font-family: 'Barlow', sans-serif;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.45);
        }

        /* ─── ACCORDION (video section) ──────────────────────── */
        .accordion {
            width: 100%;
            max-width: 820px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
            opacity: 0;
        }
        .accordion.open {
            max-height: 1000px;
            opacity: 1;
        }

        .accordion-inner {
            padding-top: 20px;
        }

        /* ─── VIDEO CARD ─────────────────────────────────────── */
        .video-card {
            width: 100%;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 8px 60px rgba(0,0,0,0.8),
                0 0 80px var(--red-dim);
            overflow: hidden;
            position: relative;
        }

        .video-ratio {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }
        .video-ratio #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Blocks native YouTube clicks */
        .video-blocker {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── SOUND ACTIVATION OVERLAY ───────────────────────── */
        .sound-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(0,0,0,0.78);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .sound-overlay.hidden { display: none; }

        .sound-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #c40812 0%, #e50914 50%, #ff2a2a 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 0 2px rgba(229,9,20,0.3), 0 0 40px rgba(229,9,20,0.5);
            animation: pulse-btn 1.8s ease-in-out infinite;
        }
        .sound-btn svg { width: 22px; height: 22px; fill: #fff; }

        /* ─── PROGRESS BAR ───────────────────────────────────── */
        .progress-track {
            width: 100%;
            height: var(--progress-h);
            background: rgba(255,255,255,0.1);
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c40812, var(--red) 60%, #ff4444);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 10px var(--red);
            transition: width 0.5s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px var(--red);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 14px;
        }
        .progress-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            color: var(--red);
        }

        /* ─── WHATSAPP CTA BUTTON ────────────────────────────── */
        #cta-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 16px 28px;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 60%, transparent);
            display: flex;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #cta-wrap.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 48px;
            max-width: 520px;
            width: 100%;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #128C7E 0%, #25D366 60%, #2ecc71 100%);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            box-shadow:
                0 0 0 2px rgba(37,211,102,0.3),
                0 0 40px rgba(37,211,102,0.5),
                0 4px 24px rgba(0,0,0,0.6);
            animation: float-cta 2.4s ease-in-out infinite;
        }
        .cta-btn svg { width: 24px; height: 24px; fill: #fff; flex-shrink: 0; }
        .cta-btn:hover {
            box-shadow: 0 0 0 2px rgba(37,211,102,0.6), 0 0 60px rgba(37,211,102,0.7), 0 4px 24px rgba(0,0,0,0.6);
        }

        /* ─── ANIMATIONS ─────────────────────────────────────── */
        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 2px rgba(229,9,20,0.3), 0 0 30px rgba(229,9,20,0.4); }
            50%       { transform: scale(1.03); box-shadow: 0 0 0 2px rgba(229,9,20,0.5), 0 0 50px rgba(229,9,20,0.7); }
        }
        @keyframes float-cta {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── MOBILE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .page { padding: 28px 8px 120px; }
            .video-card { border-radius: 6px; }
            .cta-btn { font-size: 1.05rem; padding: 16px 20px; gap: 10px; }
            .sound-btn { font-size: 1rem; padding: 14px 24px; }
            .audio-card { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /* ═══════════════════════════════════════════════════════════
       CONFIGURAÇÃO
       ═══════════════════════════════════════════════════════════ */
    const VIDEO_ID   = 'KafPt_O_LD0';  // vídeo: https://www.youtube.com/watch?v=KafPt_O_LD0
    const VIDEO_DURATION = 244;         // 4 min 4 s = 244 segundos
    const CTA_SECOND = 234;             // 10s antes do fim (244 - 10)
    /* ═══════════════════════════════════════════════════════════ */

    // ─── STATE ───────────────────────────────────────────────────
    let player;
    let videoStarted     = false;
    let soundActivated   = false;
    let progressInterval = null;
    let ctaTimer         = null;
    let elapsedSec       = 0;

    // ─── AUDIO PLAYER (WhatsApp style) ───────────────────────────
    const audio      = document.getElementById('waAudio');
    const playBtn    = document.getElementById('waPlayBtn');
    const timeLabel  = document.getElementById('waTime');
    const waveform   = document.getElementById('waWaveform');

    // Generate fake waveform bars
    (function buildWaveform() {
        const heights = [3,5,8,12,18,22,26,30,28,24,18,14,20,27,33,28,22,17,25,32,36,30,24,19,26,34,28,22,16,18,25,30,26,20,15,22,28,24,18,14,20,26,22,16,12,18,24,20];
        heights.forEach(h => {
            const bar = document.createElement('div');
            bar.className = 'wa-bar';
            bar.style.height = (h / 36 * 26 + 4) + 'px';
            waveform.appendChild(bar);
        });
    })();

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + String(s).padStart(2,'0');
    }

    function updateWaveformProgress() {
        const bars = waveform.querySelectorAll('.wa-bar');
        const pct  = audio.duration ? audio.currentTime / audio.duration : 0;
        const playedCount = Math.floor(pct * bars.length);
        bars.forEach((b, i) => {
            b.classList.toggle('played', i < playedCount);
        });
        timeLabel.textContent = formatTime(audio.currentTime);
    }

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            playBtn.classList.add('playing');
        } else {
            audio.pause();
            playBtn.classList.remove('playing');
        }
    }

    function seekAudio(e) {
        if (!audio.duration) return;
        const rect = waveform.getBoundingClientRect();
        const pct  = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    }

    audio.addEventListener('timeupdate', updateWaveformProgress);

    audio.addEventListener('ended', () => {
        playBtn.classList.remove('playing');
        // Open accordion and init YouTube player
        openAccordionAndStartVideo();
    });

    // ─── ACCORDION + VIDEO INIT ───────────────────────────────────
    function openAccordionAndStartVideo() {
        const accordion = document.getElementById('accordion');
        accordion.classList.add('open');

        // Scroll to video smoothly
        setTimeout(() => {
            accordion.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 300);

        // YouTube player already created on page load (muted, auto-play)
        // Start progress tracking
        startFakeProgress();
        scheduleCTA();
    }

    // ─── YOUTUBE PLAYER ───────────────────────────────────────────
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width:  '100%',
            videoId: VIDEO_ID,
            playerVars: {
                autoplay:       1,
                mute:           1,
                controls:       0,
                disablekb:      1,
                rel:            0,
                modestbranding: 1,
                iv_load_policy: 3,
                fs:             0,
                playsinline:    1,
                showinfo:       0,
            },
            events: {
                onReady:       onPlayerReady,
                onStateChange: onPlayerStateChange,
            }
        });
    }

    function onPlayerReady(e) {
        // Video loads muted and plays in background silently
        // Sound overlay is shown — user must click to activate sound
    }

    function onPlayerStateChange(e) {
        // Keep playing if paused externally
        if (e.data === YT.PlayerState.PAUSED && videoStarted) {
            setTimeout(() => { try { player.playVideo(); } catch(_){} }, 200);
        }
    }

    // ─── SOUND ACTIVATION ─────────────────────────────────────────
    function activateSound() {
        if (soundActivated) return;
        soundActivated = true;

        document.getElementById('soundOverlay').classList.add('hidden');

        try {
            player.unMute();
            player.seekTo(0, true);
            player.playVideo();
        } catch(err) { console.warn('Player not ready', err); }

        videoStarted = true;
    }

    // ─── FAKE PROGRESS BAR ────────────────────────────────────────
    // Easing: rushes fast to ~70%, then crawls — keeps viewer engaged
    // Uses a two-phase curve: rapid early growth, slow late growth
    function fakeProgressValue(elapsed) {
        // Phase 1: rapid growth to ~65% in first 60s
        // Phase 2: slow crawl from 65% to 95% over remaining time
        if (elapsed < 60) {
            return 65 * (1 - Math.exp(-0.06 * elapsed));
        } else {
            const phase1 = 65 * (1 - Math.exp(-0.06 * 60)); // ~63.5
            const extra  = (95 - phase1) * (1 - Math.exp(-0.006 * (elapsed - 60)));
            return phase1 + extra;
        }
    }

    function startFakeProgress() {
        progressInterval = setInterval(() => {
            elapsedSec += 0.5;
            const pct = Math.min(fakeProgressValue(elapsedSec), 95);
            setProgressUI(pct);
        }, 500);
    }

    function setProgressUI(pct) {
        const fill  = document.getElementById('progressFill');
        const label = document.getElementById('progressPct');
        if (fill)  fill.style.width = pct.toFixed(1) + '%';
        if (label) label.textContent = Math.round(pct) + '%';
    }

    // ─── SCHEDULE CTA ─────────────────────────────────────────────
    function scheduleCTA() {
        ctaTimer = setTimeout(showCTA, CTA_SECOND * 1000);
    }

    function showCTA() {
        clearInterval(progressInterval);
        setProgressUI(100);
        const lbl = document.getElementById('progressLabel');
        if (lbl) lbl.textContent = 'Acesso liberado!';

        document.getElementById('cta-wrap').classList.add('visible');
    }

    // ─── BLOCK CONTEXT MENU ON VIDEO ─────────────────────────────
    document.addEventListener('contextmenu', e => {
        if (e.target.closest('.video-card')) e.preventDefault();
    });

    document.addEventListener('keydown', e => {
        const blocked = [' ', 'k', 'K', 'ArrowLeft', 'ArrowRight', 'j', 'J', 'l', 'L', 'f', 'F', 'm', 'M'];
        if (blocked.includes(e.key)) e.preventDefault();
    });
</script>
</body>
</html>
